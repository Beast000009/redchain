name: RedChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      
      - name: Lint with ruff
        run: |
          ruff check . --select=E,F --ignore=E501,F401,E722,F841,E701,F541,E402,F811
      
      - name: Compile check all source files
        run: |
          python -m py_compile utils.py
          python -m py_compile config.py
          python -m py_compile cli.py
          python -m py_compile models.py
          python -m py_compile redchain_cli.py
          python -m py_compile agents/osint_agent.py
          python -m py_compile agents/scanner_agent.py
          python -m py_compile agents/webapp_agent.py
          python -m py_compile agents/subdomain_agent.py
          python -m py_compile agents/cve_agent.py
          python -m py_compile agents/report_agent.py
          python -m py_compile agents/threat_intel.py
          python -m py_compile agents/nuclei_agent.py
          python -m py_compile agents/credential_agent.py
          python -m py_compile agents/takeover_agent.py
          python -m py_compile orchestrator/graph.py
          python -m py_compile report/generator.py
          python -m py_compile llm/__init__.py
          python -m py_compile llm/gemini_adapter.py
          python -m py_compile llm/openai_adapter.py
          python -m py_compile llm/ollama_adapter.py
          python -m py_compile i18n/__init__.py
          python -m py_compile plugins/__init__.py
          python -m py_compile plugins/loader.py
      
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: CLI smoke test
        run: |
          python cli.py --help

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t redchain:ci-test .
      
      - name: Test Docker image
        run: docker run --rm redchain:ci-test --help
