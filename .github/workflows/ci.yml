name: RedChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
      
      - name: Lint with ruff
        run: |
          ruff check . --ignore=E501,F401
      
      - name: Type check with mypy (soft)
        run: |
          mypy utils.py config.py --ignore-missing-imports || true
      
      - name: Compile check all source files
        run: |
          python -m py_compile utils.py
          python -m py_compile config.py
          python -m py_compile cli.py
          python -m py_compile agents/osint_agent.py
          python -m py_compile agents/scanner_agent.py
          python -m py_compile agents/webapp_agent.py
          python -m py_compile agents/subdomain_agent.py
          python -m py_compile agents/cve_agent.py
          python -m py_compile agents/report_agent.py
          python -m py_compile agents/threat_intel.py
          python -m py_compile orchestrator/graph.py
          python -m py_compile report/generator.py
          python -m py_compile llm/__init__.py
          python -m py_compile llm/gemini_adapter.py
          python -m py_compile llm/openai_adapter.py
          python -m py_compile llm/ollama_adapter.py
          python -m py_compile i18n/__init__.py
          python -m py_compile plugins/__init__.py
          python -m py_compile plugins/loader.py
      
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
      
      - name: CLI smoke test
        run: |
          python cli.py --help

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t redchain:ci-test .
      
      - name: Test Docker image
        run: docker run --rm redchain:ci-test --help
